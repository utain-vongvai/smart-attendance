<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดชั่วโมงเรียน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #1DB446;
      --green-dark: #0ea33a;
      --green-bg: #f0faf3;
      --green-light: #e6f7eb;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --text-primary: #1a1a1a;
      --text-muted: #6b7280;
      --text-hint: #9ca3af;
      --border: #e5e7eb;
      --surface: #f9fafb;
      --white: #fff;
    }

    body {
      font-family: 'Sarabun', system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--white);
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--white);
      border-bottom: 0.5px solid var(--border);
      padding: clamp(12px, 3vw, 20px) clamp(16px, 4vw, 24px);
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-title {
      font-size: clamp(14px, 3.5vw, 16px);
      font-weight: 500;
      color: var(--text-primary);
    }
    .topbar-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Hero band ── */
    .hero {
      background: linear-gradient(145deg, #1DB446 0%, #0ea33a 100%);
      padding: clamp(20px, 5vw, 32px) clamp(16px, 4vw, 24px);
      color: #fff;
      text-align: center;
    }
    .hero-label {
      font-size: 13px;
      opacity: .8;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .hero-hours {
      font-size: clamp(48px, 12vw, 64px);
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }
    .hero-unit { font-size: 15px; opacity: .75; margin-bottom: 20px; }
    .hero-pills {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
    }

    /* ── Info grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      background: var(--border);
      border-bottom: 0.5px solid var(--border);
    }
    .info-cell {
      background: var(--white);
      padding: 14px 12px;
      text-align: center;
    }
    .info-cell-label {
      font-size: 11px;
      color: var(--text-hint);
      margin-bottom: 4px;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .info-cell-value {
      font-size: clamp(12px, 3vw, 14px);
      font-weight: 500;
      color: var(--text-primary);
      word-break: break-all;
    }

    /* ── Section ── */
    .section { padding: clamp(16px, 4vw, 24px); }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .badge {
      background: var(--green-bg);
      color: var(--green-dark);
      border: 0.5px solid rgba(29,180,70,.2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Stat cards ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 14px;
      border: 0.5px solid var(--border);
    }
    .stat-card-label {
      font-size: 11px;
      color: var(--text-hint);
      text-transform: uppercase;
      letter-spacing: .3px;
      margin-bottom: 6px;
    }
    .stat-card-val {
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 600;
      color: var(--text-primary);
    }
    .stat-card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Day cards ── */
    .day-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background .15s;
    }
    .day-card:hover { background: var(--surface); }
    .day-card:last-child { margin-bottom: 0; }
    .day-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--green-bg);
      border: 0.5px solid rgba(29,180,70,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .day-icon svg { width: 18px; height: 18px; stroke: var(--green-dark); }
    .day-info { flex: 1; min-width: 0; }
    .day-date {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .day-hours { text-align: right; flex-shrink: 0; }
    .day-hours-val { font-size: 16px; font-weight: 600; color: var(--green-dark); }
    .day-hours-label { font-size: 11px; color: var(--text-hint); }

    /* ── States ── */
    .loading-state, .error-state, .empty-state {
      text-align: center;
      padding: 60px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .state-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .loading-state .state-icon { background: var(--green-bg); }
    .error-state .state-icon { background: #fff0f0; }
    .empty-state .state-icon { background: var(--surface); border: 0.5px solid var(--border); }
    .state-title { font-size: 16px; font-weight: 500; color: var(--text-primary); }
    .state-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--green-bg);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      padding: 16px 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-hint);
      border-top: 0.5px solid var(--border);
      margin-top: auto;
    }

    /* ── Responsive (≥ 480px: slightly wider panels) ── */
    @media (min-width: 640px) {
      .app { box-shadow: 0 0 0 0.5px var(--border), 0 8px 32px rgba(0,0,0,0.08); margin-top: 24px; margin-bottom: 24px; border-radius: 20px; min-height: auto; overflow: hidden; }
      body { padding: 0 16px; }
    }
  </style>
</head>

<body>

<div class="app">

  <div class="topbar">
    <div>
      <div class="topbar-title">รายละเอียดชั่วโมงเรียน</div>
      <div class="topbar-sub" id="topbar-sub">กำลังโหลด...</div>
    </div>
  </div>

  <div id="content">
    <div class="loading-state">
      <div class="state-icon"><div class="spinner"></div></div>
      <div class="state-title">กำลังโหลดข้อมูล</div>
      <div class="state-sub">โปรดรอสักครู่...</div>
    </div>
  </div>

  <div class="footer">Copyright © 2024 Utain Vongvai (AKE) - All rights reserved.</div>
</div>

<script>
  // ============================
  // CONFIG
  // ============================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyg9dqrhso9ZSP1w0En18fCVm2-T6cn4lCrviMMf4b5byFklrQoPdQyv6I-ZtzQLXiwqw/exec";

  // ============================
  // รับค่าจาก URL
  // ============================
  const urlParams = new URLSearchParams(window.location.search);
  const PARAMS = {
    term: urlParams.get('term'),
    subject: urlParams.get('subject'),
    studentId: urlParams.get('studentId')
  };

  // ============================
  // API CALL
  // ============================
  async function callAPI(action, payload) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...payload })
    });
    return await res.json();
  }

  // ============================
  // แสดงข้อมูล
  // ============================
  function displayData(data) {
    const el = document.getElementById('content');
    const sub = document.getElementById('topbar-sub');
    sub.textContent = PARAMS.subject || PARAMS.term || '';

    if (!data || data.totalHours === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="state-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div class="state-title">ไม่พบข้อมูล</div>
          <div class="state-sub">${PARAMS.subject || ''}<br>${PARAMS.term || ''}</div>
        </div>`;
      return;
    }

    const n = data.details.length;
    const avg = n ? data.totalHours / n : 0;
    const maxD = data.details.reduce((a, b) => b.durationHours > a.durationHours ? b : a, data.details[0] || { durationHours: 0 });

    let cards = '';
    data.details.forEach(d => {
      cards += `
        <div class="day-card">
          <div class="day-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div class="day-info">
            <div class="day-date">${d.date}</div>
            <div class="day-time">${d.first} – ${d.last}</div>
          </div>
          <div class="day-hours">
            <div class="day-hours-val">${d.durationHours.toFixed(2)}</div>
            <div class="day-hours-label">ชม.</div>
          </div>
        </div>`;
    });

    el.innerHTML = `
      <div class="hero">
        <div class="hero-label">ชั่วโมงรวมทั้งหมด</div>
        <div class="hero-hours">${data.totalHours.toFixed(2)}</div>
        <div class="hero-unit">ชั่วโมง</div>
        <div class="hero-pills">
          <span class="pill">${PARAMS.term || ''}</span>
          <span class="pill">${PARAMS.subject || ''}</span>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-cell">
          <div class="info-cell-label">รหัสนักเรียน</div>
          <div class="info-cell-value">${PARAMS.studentId || '–'}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">วันเรียน</div>
          <div class="info-cell-value">${n} วัน</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">เฉลี่ย/วัน</div>
          <div class="info-cell-value">${avg.toFixed(2)} ชม.</div>
        </div>
      </div>

      <div class="section">
        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-card-label">วันสูงสุด</div>
            <div class="stat-card-val">${maxD.durationHours ? maxD.durationHours.toFixed(2) : '–'}</div>
            <div class="stat-card-sub">${maxD.date || '–'}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">ชั่วโมงรวม</div>
            <div class="stat-card-val">${data.totalHours.toFixed(2)}</div>
            <div class="stat-card-sub">ทุกคาบเรียน</div>
          </div>
        </div>

        <div class="section-header">
          <div class="section-title">ประวัติการเข้าเรียน</div>
          <span class="badge">${n} วัน</span>
        </div>
        ${cards}
      </div>`;
  }

  function displayError(msg) {
    document.getElementById('topbar-sub').textContent = 'เกิดข้อผิดพลาด';
    document.getElementById('content').innerHTML = `
      <div class="error-state">
        <div class="state-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <div class="state-title">เกิดข้อผิดพลาด</div>
        <div class="state-sub">${msg}</div>
      </div>`;
  }

  // ============================
  // โหลดข้อมูล
  // ============================
  window.onload = async () => {
    if (!PARAMS.term || !PARAMS.subject || !PARAMS.studentId) {
      displayError('ข้อมูลไม่ครบถ้วน กรุณาตรวจสอบ URL');
      return;
    }
    try {
      const result = await callAPI('calculateHours_detail', {
        term: PARAMS.term,
        subject: PARAMS.subject,
        studentId: PARAMS.studentId
      });
      displayData(result);
    } catch (err) {
      displayError(err.message);
    }
  };
</script>

</body>
</html>
