<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดชั่วโมงเรียน</title>

  <style>
    /* (เหมือนเดิมทั้งหมด ไม่แก้ CSS) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sarabun', 'Prompt', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1DB446 0%, #0ea33a 100%);
      color: white;
      padding: 25px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 10px; }
    .info-section { padding: 20px; background: #f8f9fa; border-bottom: 2px solid #e9ecef; }
    .info-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #dee2e6; }
    .info-item:last-child { border-bottom: none; }
    .info-label { font-weight: bold; color: #666; }
    .info-value { color: #333; }
    .total-hours { background: #e8f5e9; padding: 20px; text-align: center; border-bottom: 3px solid #1DB446; }
    .total-hours h2 { color: #1DB446; font-size: 36px; margin-bottom: 5px; }
    .total-hours p { color: #666; font-size: 14px; }
    .details-section { padding: 20px; }
    .details-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #1DB446; padding-bottom: 10px; }
    .detail-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid #1DB446;
    }
    .loading, .error, .no-data {
      text-align: center;
      padding: 50px;
    }
    .footer {
      text-align: center;
      padding: 10px;
      color: white;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>📊 รายละเอียดชั่วโมงเรียน</h1>
  </div>

  <div id="content">
    <div class="loading">⏳ กำลังโหลดข้อมูล...</div>
  </div>
</div>

<div class="footer">
  Copyright © 2024 Utain Vongvai (AKE)
</div>

<script>
  // ============================
  // 🔥 CONFIG (ใส่ URL ของคุณ)
  // ============================
  const GAS_URL = "https://script.google.com/macros/s/XXXXX/exec";

  // ============================
  // 🔥 รับค่าจาก URL
  // ============================
  const urlParams = new URLSearchParams(window.location.search);

  const PARAMS = {
    term: urlParams.get('term'),
    subject: urlParams.get('subject'),
    studentId: urlParams.get('studentId')
  };

  // ============================
  // 🔥 API CALL
  // ============================
  async function callAPI(action, payload) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...payload })
    });

    return await res.json();
  }

  // ============================
  // 🔥 แสดงข้อมูล
  // ============================
  function displayData(data) {
    const el = document.getElementById('content');

    if (!data || data.totalHours === 0) {
      el.innerHTML = `
        <div class="no-data">
          😔 ไม่พบข้อมูล<br>
          ${PARAMS.subject} (${PARAMS.term})
        </div>`;
      return;
    }

    let html = `
      <div class="info-section">
        <div class="info-item"><span>รายวิชา</span><span>${PARAMS.subject}</span></div>
        <div class="info-item"><span>เทอม</span><span>${PARAMS.term}</span></div>
        <div class="info-item"><span>รหัส</span><span>${PARAMS.studentId}</span></div>
      </div>

      <div class="total-hours">
        <h2>${data.totalHours.toFixed(2)}</h2>
        <p>ชั่วโมงรวม</p>
      </div>

      <div class="details-section">
        <div class="details-title">รายละเอียด (${data.details.length} วัน)</div>
    `;

    data.details.forEach(d => {
      html += `
        <div class="detail-card">
          <div>📅 ${d.date}</div>
          <div>⏰ ${d.first} - ${d.last}</div>
          <div>⏱️ ${d.durationHours.toFixed(2)} ชม.</div>
        </div>`;
    });

    html += `</div>`;
    el.innerHTML = html;
  }

  function displayError(msg) {
    document.getElementById('content').innerHTML =
      `<div class="error">❌ ${msg}</div>`;
  }

  // ============================
  // 🔥 โหลดข้อมูล
  // ============================
  window.onload = async () => {

    if (!PARAMS.term || !PARAMS.subject || !PARAMS.studentId) {
      displayError('ข้อมูลไม่ครบ');
      return;
    }

    try {
      const result = await callAPI('calculateHours_detail', {
        term: PARAMS.term,
        subject: PARAMS.subject,
        studentId: PARAMS.studentId
      });

      displayData(result);

    } catch (err) {
      displayError(err.message);
    }
  };
</script>

</body>
</html>
